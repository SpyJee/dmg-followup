name: Deploy DMG Follow-Up

on:
  push:
    branches: [master]

permissions:
  id-token: write
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'index.html'
            backend:
              - 'azure-function-index.js'
              - 'azure-function-function.json'

  deploy-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Upload index.html to $web
        run: |
          az storage blob upload \
            --account-name dmgfollowup \
            --container-name '$web' \
            --name index.html \
            --file index.html \
            --overwrite \
            --auth-mode login

  deploy-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Prepare function package
        run: |
          mkdir -p deploy/followup-api
          cp azure-function-index.js deploy/followup-api/index.js
          cp azure-function-function.json deploy/followup-api/function.json
          cat > deploy/host.json << 'EOF'
          {
            "version": "2.0",
            "extensionBundle": {
              "id": "Microsoft.Azure.Functions.ExtensionBundle",
              "version": "[4.*, 5.0.0)"
            }
          }
          EOF
          cd deploy && zip -r ../function.zip .

      - name: Deploy to Azure Function App
        run: |
          az functionapp deployment source config-zip \
            --resource-group dmg-quoting-rg \
            --name dmg-followup-proxy \
            --src function.zip
