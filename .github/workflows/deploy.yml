name: Deploy DMG Follow-Up

on:
  push:
    branches: [master]

permissions:
  id-token: write
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'index.html'
            backend:
              - 'azure-function-index.js'
              - 'azure-function-function.json'
              - 'azure-function-keepalive-index.js'
              - 'azure-function-keepalive-function.json'

  deploy-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Upload index.html to $web (gzipped, conditional-GET)
        run: |
          # Pre-compress with gzip so Azure blob storage (which doesn't
          # auto-compress) ships a ~5x smaller payload over the wire.
          # Cache-Control: no-cache forces the browser to revalidate via
          # ETag on every load — Azure auto-emits the ETag, so unchanged
          # deploys return a tiny 304 instead of the full body, and real
          # deploys are picked up immediately without a hard refresh.
          gzip -9 -k -f index.html
          az storage blob upload \
            --account-name dmgfollowup \
            --container-name '$web' \
            --name index.html \
            --file index.html.gz \
            --content-encoding gzip \
            --content-type 'text/html; charset=utf-8' \
            --content-cache-control 'no-cache' \
            --overwrite \
            --auth-mode login

  deploy-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Prepare function package
        run: |
          mkdir -p deploy/followup-api
          cp azure-function-index.js deploy/followup-api/index.js
          cp azure-function-function.json deploy/followup-api/function.json
          # Keep-warm timer — fires every 5 min so the Consumption worker
          # doesn't scale to zero between user requests. Cold start was
          # 2-5s on the first hit of the day; this keeps the worker hot.
          mkdir -p deploy/keepalive
          cp azure-function-keepalive-index.js deploy/keepalive/index.js
          cp azure-function-keepalive-function.json deploy/keepalive/function.json
          cat > deploy/host.json << 'EOF'
          {
            "version": "2.0",
            "extensionBundle": {
              "id": "Microsoft.Azure.Functions.ExtensionBundle",
              "version": "[4.*, 5.0.0)"
            }
          }
          EOF
          cd deploy && zip -r ../function.zip .

      - name: Deploy to Azure Function App
        run: |
          az functionapp deployment source config-zip \
            --resource-group dmg-quoting-rg \
            --name dmg-followup-proxy \
            --src function.zip

      - name: Smoke test /health
        run: |
          HOST=$(az functionapp show -g dmg-quoting-rg -n dmg-followup-proxy --query defaultHostName -o tsv)
          URL="https://${HOST}/api/followup/health"
          echo "Pinging $URL"
          for i in 1 2 3 4 5 6; do
            if RESP=$(curl -fsS --max-time 15 "$URL"); then
              echo "Response: $RESP"
              echo "$RESP" | grep -q '"status":"ok"' || { echo "FAIL: status not ok"; exit 1; }
              echo "$RESP" | grep -q '"node":"v22' || { echo "FAIL: Node runtime is not v22"; exit 1; }
              echo "Smoke test passed."
              exit 0
            fi
            echo "Attempt $i failed, sleeping 10s..."
            sleep 10
          done
          echo "FAIL: health endpoint did not respond after 6 attempts"
          exit 1
